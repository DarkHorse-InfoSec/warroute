<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0f12" />
  <title>{% block title %}WarRoute{% endblock %}</title>
  <link rel="stylesheet" href="/static/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/static/app.css" />
  <script src="/static/vendor/htmx-1.9.12.min.js"></script>
  <script nonce="{{ request.state.csp_nonce }}">
    // Stamp htmx-swapped inline scripts with this page's CSP nonce so they still
    // execute once script-src drops 'unsafe-inline' (see warroute/web/app.py). The
    // plan-result and run maps arrive via htmx swaps and would otherwise be blocked.
    htmx.config.inlineScriptNonce = "{{ request.state.csp_nonce }}";
  </script>
  <script src="/static/app.js"></script>
  <script defer src="/static/vendor/leaflet/leaflet.js"></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">WarRoute</a>
    <nav>
      <a href="/plan">Plan</a>
      <a href="/coverage">Coverage</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footnote">
    v{{ app_version }} &middot; plan in driveway, drive with phone in pocket
  </footer>
</body>
</html>
