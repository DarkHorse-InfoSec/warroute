{# HTMX partial: rendered into #destination-hits by /plan/geocode. #}
{% if error %}
  <div class="flash error" style="margin: 0.5rem 0;">{{ error }}</div>
{% elif hits %}
  <ul class="geocode-hits" role="listbox">
    {% for h in hits %}
    <li>
      <button type="button"
              class="geocode-hit{% if h.distance_km and h.distance_km > 200 %} far{% endif %}"
              data-lat="{{ "%.6f"|format(h.lat) }}"
              data-lon="{{ "%.6f"|format(h.lon) }}"
              data-label="{{ h.label or h.name }}"
              data-action="geocode-select">
        <span class="geocode-hit-name">
          {{ h.name or h.label or "(unnamed)" }}
          {% if h.distance_km is not none %}
            <span class="geocode-hit-dist">
              <span data-dist-km="{{ h.distance_km }}">{% if h.distance_km < 1 %}{{ (h.distance_km * 1000)|int }} m{% elif h.distance_km < 10 %}{{ "%.1f"|format(h.distance_km) }} km{% else %}{{ h.distance_km|int }} km{% endif %}</span>
              away
            </span>
          {% endif %}
        </span>
        {% if h.label and h.label != h.name %}
          <span class="geocode-hit-addr">{{ h.label }}</span>
        {% endif %}
      </button>
    </li>
    {% endfor %}
  </ul>
{% else %}
  <div class="geocode-empty">No matches. Try a more specific query.</div>
{% endif %}
